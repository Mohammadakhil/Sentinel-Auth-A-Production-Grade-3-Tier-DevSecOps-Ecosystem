name: Sentinel DevSecOps CI

permissions:
id-token: write
contents: read

on:
push:
workflow_dispatch:
branches: [ main ]

jobs:
sentinel-pipeline:

runs-on: ubuntu-latest

steps:

# -------------------------
# Checkout Repository
# -------------------------
- name: Checkout Code
  uses: actions/checkout@v4
  with:
    fetch-depth: 0


# -------------------------
# Python Security Scan
# -------------------------
- name: Bandit Security Scan
  run: |
    pip install bandit
    bandit -r ./app -ll


# -------------------------
# SonarCloud Scan
# -------------------------
- name: SonarCloud Scan
  uses: SonarSource/sonarqube-scan-action@master
  env:
    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


# -------------------------
# Build Docker Images
# -------------------------
- name: Build Docker Stack
  run: docker compose build


# -------------------------
# Container Security Scan
# -------------------------
- name: Trivy Scan Backend
  uses: aquasecurity/trivy-action@master
  with:
    image-ref: 'sentinel-backend:latest'
    format: 'table'
    exit-code: '1'
    severity: 'CRITICAL'


# -------------------------
# Docker Hub Login
# -------------------------
- name: Login to Docker Hub
  uses: docker/login-action@v3
  with:
    username: ${{ secrets.DOCKER_USERNAME }}
    password: ${{ secrets.DOCKER_PASSWORD }}


# -------------------------
# Tag Docker Images
# -------------------------
- name: Tag Docker Images
  run: |
    docker tag sentinel-backend:latest ${{ secrets.DOCKER_USERNAME }}/sentinel-backend:latest
    docker tag sentinel-frontend:latest ${{ secrets.DOCKER_USERNAME }}/sentinel-frontend:latest


# -------------------------
# Push Images
# -------------------------
- name: Push Docker Images
  run: |
    docker push ${{ secrets.DOCKER_USERNAME }}/sentinel-backend:latest
    docker push ${{ secrets.DOCKER_USERNAME }}/sentinel-frontend:latest


# -------------------------
# AWS Authentication (OIDC)
# -------------------------
- name: Configure AWS Credentials
  uses: aws-actions/configure-aws-credentials@v4
  with:
    role-to-assume: arn:aws:iam::184515318701:role/github-terraform-role
    aws-region: us-east-1


# -------------------------
# Setup Terraform
# -------------------------
- name: Setup Terraform
  uses: hashicorp/setup-terraform@v3
  with:
    terraform_wrapper: false


# -------------------------
# Terraform Init
# -------------------------
- name: Terraform Init
  working-directory: terraform
  run: terraform init


# -------------------------
# Terraform Plan
# -------------------------
- name: Terraform Plan
  working-directory: terraform
  run: terraform plan -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}"


# -------------------------
# Terraform Apply
# -------------------------
- name: Terraform Apply
  working-directory: terraform
  run: terraform apply -auto-approve -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}"


# -------------------------
# Capture EC2 IP
# -------------------------
- name: Capture Instance IP
  working-directory: terraform
  run: |
    INSTANCE_IP=$(terraform output -raw instance_ip)
    echo "INSTANCE_IP=$INSTANCE_IP" >> $GITHUB_ENV
    echo "EC2 IP: $INSTANCE_IP"


# -------------------------
# Install Ansible
# -------------------------
- name: Install Ansible
  run: |
    sudo apt update
    sudo apt install -y ansible


# -------------------------
# Wait for SSH
# -------------------------
- name: Wait for SSH
  run: |
    echo "Waiting for EC2 SSH..."
    sleep 30


# -------------------------
# Setup SSH
# -------------------------
- name: Setup SSH
  run: |
    mkdir -p ~/.ssh
    echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
    chmod 600 ~/.ssh/id_rsa


# -------------------------
# Run Ansible
# -------------------------
- name: Run Ansible
  run: |
    ansible-playbook \
    -i "$INSTANCE_IP," \
    ansible/deploy_app.yml \
    --user ubuntu \
    --private-key ~/.ssh/id_rsa \
    --extra-vars "ansible_ssh_common_args='-o StrictHostKeyChecking=no'"


# -------------------------
# Deploy Kubernetes
# -------------------------
- name: Deploy Kubernetes
  run: |
    ssh -o StrictHostKeyChecking=no ubuntu@$INSTANCE_IP << 'EOF'
    kubectl apply -f k8s/
    kubectl rollout restart deployment/sentinel-backend
    kubectl rollout restart deployment/sentinel-frontend
    EOF


# -------------------------
# Health Check
# -------------------------
- name: Health Check
  run: |
    echo "Checking application health..."

    for i in {1..10}; do
      STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://$INSTANCE_IP:30080)

      if [ "$STATUS" -eq 200 ]; then
        echo "Application is healthy!"
        exit 0
      fi

      echo "Waiting for service..."
      sleep 10
    done

    echo "Health check failed!"
    exit 1
