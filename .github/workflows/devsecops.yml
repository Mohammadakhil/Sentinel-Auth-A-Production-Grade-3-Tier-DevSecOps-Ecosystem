name: Sentinel DevSecOps CI

on:
  push:
    branches: [ main ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      # 1. SAST: Python Security Scan
      - name: Bandit Scan
        run: |
          pip install bandit
          # Scans the app folder for security vulnerabilities
          bandit -r ./app -ll

      # 2. BUILD: Use Compose but force a known tag for scanning
      - name: Build Stack
        run: |
          docker-compose build
          # Manually tagging ensures Trivy finds the image regardless of project name
          docker build -t sentinel-backend:latest ./app

        # This will list images that are build [this is using to catch the error]  
      - name: List Docker Images
        run: docker images

      # 3. SCA: Container Vulnerability Scan
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'sentinel-backend:latest'
          format: 'table'
          exit-code: '1' 
          severity: 'CRITICAL,HIGH'

      # 4. QUALITY: SonarCloud Deep Analysis
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
