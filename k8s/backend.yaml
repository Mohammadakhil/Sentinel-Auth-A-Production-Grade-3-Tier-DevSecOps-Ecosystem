apiVersion: apps/v1
Kind: Deployment
metadata:
  name: sentinel-backend
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: secure-auth-backend
  template:
    metadata:
      labels:
        app: secure-auth-backend
    spec:
      containers:
      - name: secure-auth-backend-container
        image: mahmmadakhil/sentinel-backend:latest
        ports:
        - containerPort: 8081
        env:
        - name: BACKEND_URL
          value: http://backend-service:8081
---
apiVersion: v1
kind: Service
metadata:
  name: secure-auth-backend
spec:
  selector:
    app: sentinel-backend
  type: ClusterIP
  ports:
  - port: 8081
    targetPort: 8081
